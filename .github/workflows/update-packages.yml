name: Update NuGet packages

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday, 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore && dotnet tool restore

      - name: Upgrade packages
        run: dotnet dotnet-outdated --upgrade --version-lock Minor

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "diff<<EOF" >> "$GITHUB_OUTPUT"
            git diff Directory.Packages.props >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-packages
          commit-message: "chore: update NuGet packages"
          title: "chore: update NuGet packages"
          body: |
            Automated NuGet package updates via `dotnet outdated --upgrade --version-lock Minor`.

            ```diff
            ${{ steps.changes.outputs.diff }}
            ```
          labels: dependencies
          delete-branch: true
