name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Ciderfy.slnx

      - name: Build
        run: dotnet build Ciderfy.slnx --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test Ciderfy.slnx --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --settings coverage.runsettings

      - name: Find coverage files
        id: coverage
        run: |
          files=$(find ./coverage -name 'coverage.cobertura.xml' | paste -sd ',')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ${{ steps.coverage.outputs.files }}
